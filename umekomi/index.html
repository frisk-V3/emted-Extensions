<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 350px; padding: 15px; font-family: sans-serif; background: #f4f4f4; }
    textarea { width: 100%; height: 150px; box-sizing: border-box; font-family: monospace; }
    button { 
      margin-top: 10px; width: 100%; padding: 12px; 
      background: #28a745; color: white; border: none; 
      border-radius: 4px; cursor: pointer; font-weight: bold; 
    }
    button:hover { background: #218838; }
    .info { font-size: 11px; color: #666; margin-top: 8px; }
  </style>
</head>
<body>
  <h3 style="margin:0 0 10px 0;">一時埋め込みツール</h3>
  <textarea id="code-input" placeholder='<iframe ...></iframe>'></textarea>
  <button id="exec-btn">このタブに反映する</button>
  <p class="info">※再読み込みやタブを閉じると消えます。</p>
  <script src="popup.js"></script>
</body>
</html>
